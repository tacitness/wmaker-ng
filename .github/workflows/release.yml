name: Release

# Tag-driven, like tsctl: `make bump-patch|minor|major` pushes a v* tag → this
# runs. Version lives ONLY in the tag. All third-party Actions are pinned by
# commit SHA with a version comment.
#
# Secrets follow the house pattern (dagobah-infra): GitHub Actions assumes an
# AWS role via OIDC and pulls signing/deploy keys from Secrets Manager at
# release time — nothing sensitive is stored as a GitHub Actions secret. The
# signing + publish steps gate on the `AWS_ROLE_ARN` repo variable, so the
# pipeline is green before infra wires the role and hardens automatically once
# it does.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Cross-build the matrix: {glibc(EL9 floor), musl} × {amd64, arm64} ─────
  build:
    name: Build ${{ matrix.stage }}
    runs-on: wmaker-ng-ci-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu.2.34, stage: amd64-gnu, arch: amd64, libc: gnu }
          - { target: aarch64-unknown-linux-gnu.2.34, stage: arm64-gnu, arch: arm64, libc: gnu }
          - { target: x86_64-unknown-linux-musl, stage: amd64-musl, arch: amd64, libc: musl }
          - { target: aarch64-unknown-linux-musl, stage: arm64-musl, arch: arm64, libc: musl }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # tags needed for version derivation
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: taiki-e/install-action@81ee1d48d9194cdcab880cbdc7d36e87d39874cb # v2.62.45
        with:
          tool: cargo-zigbuild
      - name: Derive version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Cross-build
        run: scripts/build.sh ${{ matrix.target }} ${{ matrix.stage }}
      - name: Tarball
        run: scripts/tarball.sh ${{ matrix.arch }} ${{ matrix.libc }} ${{ matrix.stage }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.stage }}
          path: dist/
          retention-days: 7

  # ── 2. Package: deb/rpm (glibc) + apk (musl) for both arches via nfpm ─────────
  packages:
    name: Package (deb/rpm/apk)
    needs: build
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true
      - uses: taiki-e/install-action@81ee1d48d9194cdcab880cbdc7d36e87d39874cb # v2.62.45
        with:
          tool: nfpm
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base
      - name: Derive version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build packages
        run: make packages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: dist/pkg/
          retention-days: 7

  # ── 3. Assemble + sign repos, publish, and cut the GitHub Release ────────────
  release:
    name: Sign, publish & release
    needs: packages
    runs-on: wmaker-ng-ci-build
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC: assume the AWS role
    env:
      AWS_REGION: us-west-2
      # Secrets Manager secret ids (override via repo vars if infra names differ).
      SM_GPG_KEY: ${{ vars.SM_GPG_KEY || '/tacitsoft/wmaker-ng/gpg-signing-key' }}
      SM_APK_KEY: ${{ vars.SM_APK_KEY || '/tacitsoft/wmaker-ng/apk-signing-key' }}
      SM_DEPLOY_KEY: ${{ vars.SM_DEPLOY_KEY || '/tacitsoft/wmaker-ng/repos-deploy-ssh-key' }}
      # Signing + publish activate once infra sets the AWS_ROLE_ARN repo variable.
      HAS_AWS: ${{ vars.AWS_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: dist/pkg/
      - name: Install repo tooling
        run: sudo apt-get update && sudo apt-get install -y reprepro createrepo-c rpm gnupg

      - name: Configure AWS credentials (OIDC)
        if: env.HAS_AWS == 'true'
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: wmaker-ng-release-${{ github.run_id }}

      - name: Fetch signing material from Secrets Manager
        if: env.HAS_AWS == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist/.keys && chmod 700 dist/.keys
          # GPG private key → apt (reprepro) + rpm (rpm --addsign). Key id derived.
          aws secretsmanager get-secret-value --secret-id "$SM_GPG_KEY" \
            --query SecretString --output text | gpg --batch --import
          key_id="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          echo "GPG_KEY_ID=$key_id" >> "$GITHUB_ENV"
          # apk RSA private key → abuild-sign (separate key from GPG).
          aws secretsmanager get-secret-value --secret-id "$SM_APK_KEY" \
            --query SecretString --output text > dist/.keys/wmaker-ng.rsa
          chmod 600 dist/.keys/wmaker-ng.rsa
          echo "ABUILD_KEY=$PWD/dist/.keys/wmaker-ng.rsa" >> "$GITHUB_ENV"

      - name: Assemble apt + rpm repos
        run: make repo-apt repo-rpm

      - name: Assemble apk repo (Alpine container)
        run: |
          keyenv=""
          [ -n "${ABUILD_KEY:-}" ] && keyenv="-e ABUILD_KEY=/w/dist/.keys/wmaker-ng.rsa"
          docker run --rm -v "$PWD:/w" -w /w $keyenv alpine:3.22 sh -c \
            'apk add --no-cache bash abuild >/dev/null && bash scripts/repo-apk.sh dist/repo/apk dist/pkg'

      - name: Publish repos to repos.tacitsoft.dev
        if: env.HAS_AWS == 'true'
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)"
          aws secretsmanager get-secret-value --secret-id "$SM_DEPLOY_KEY" \
            --query SecretString --output text | ssh-add -
          scripts/publish.sh dist/repo

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/tarballs/* dist/pkg/*
