name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# House style: ALL third-party Actions are pinned by commit SHA with a version
# comment (PLAN §7). Bump the SHA and the comment together.
env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-check:
    name: Format check
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (deny warnings)
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
      - run: cargo build --workspace --locked

  test:
    name: Test
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
      - run: cargo test --workspace --locked

  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: |
          set -euo pipefail
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.2/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2.tgz"
          sha256="ab28a1bdb54db4d5d8ad5981cf1f959410370b3d28250dbd35f6a44248620e39"
          curl -fsSL "$url" -o cargo-audit.tgz
          echo "$sha256  cargo-audit.tgz" | sha256sum -c -
          tar -xzf cargo-audit.tgz
          mkdir -p "$HOME/.cargo/bin"
          install -m 0755 cargo-audit-x86_64-unknown-linux-gnu-v0.22.2/cargo-audit "$HOME/.cargo/bin/cargo-audit"
      - run: cargo audit

  deny:
    name: cargo-deny (supply chain / licenses)
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - name: Install cargo-deny
        run: |
          set -euo pipefail
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.8/cargo-deny-0.19.8-x86_64-unknown-linux-musl.tar.gz"
          sha256="70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
          curl -fsSL "$url" -o cargo-deny.tar.gz
          echo "$sha256  cargo-deny.tar.gz" | sha256sum -c -
          tar -xzf cargo-deny.tar.gz
          mkdir -p "$HOME/.cargo/bin"
          install -m 0755 cargo-deny-0.19.8-x86_64-unknown-linux-musl/cargo-deny "$HOME/.cargo/bin/cargo-deny"
      - run: cargo deny check

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: wmaker-ng-ci-build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # scan full history, not just the tip
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Public repo → no license needed. Config: ./.gitleaks.toml
          GITLEAKS_CONFIG: .gitleaks.toml
