# nfpm recipe — wmaker-ai package (Layer 3: the MCP AI control plane).
#
# Driven by the same env vars as wmaker-ng.yaml (PKG_VERSION / PKG_ARCH /
# WMNG_STAGE) and the same signing keys. Depends on wmaker-ng.
name: wmaker-ai
arch: ${PKG_ARCH}
platform: linux
version: ${PKG_VERSION}
section: x11
priority: optional
maintainer: The wmaker-ng Team <ops@tacitsoft.dev>
description: |
  The AI control plane for Window Maker: a model-agnostic MCP server exposing
  computer-use tools (input synthesis, screen capture, window control, and a
  screen-diff change feed) over existing X11 extensions. Any model connects
  over MCP; the window manager never learns it is being driven.
vendor: TacitSoft
homepage: https://windowmaker.org
license: GPL-2.0-or-later

depends:
  - wmaker-ng

contents:
  - src: ${WMNG_STAGE}/ai-mcp
    dst: /usr/bin/ai-mcp

# Signing is applied at the repo-assembly layer (see scripts/repo.sh), so the
# recipe is identical for local (unsigned) and release (signed) runs.
