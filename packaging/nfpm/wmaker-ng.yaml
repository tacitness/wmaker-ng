# nfpm recipe — wmaker-ng package (Layer 2: modern Linux integration, no AI).
#
# One recipe, many targets. The Makefile drives the matrix by exporting:
#   PKG_VERSION  — semver derived from the git tag (never written here)
#   PKG_ARCH     — nfpm arch: amd64 | arm64 (nfpm maps to each packager's name)
#   WMNG_STAGE   — dir holding the compiled binaries for this arch+libc
# and invoking `nfpm package --packager {deb,rpm,apk}`.
#
# glibc binaries (built against the EL9 floor, glibc 2.34) feed deb + rpm;
# musl-static binaries feed apk. Same recipe either way.
name: wmaker-ng
arch: ${PKG_ARCH}
platform: linux
version: ${PKG_VERSION}
section: x11
priority: optional
maintainer: The wmaker-ng Team <ops@tacitsoft.dev>
description: |
  Modern Linux integration for GNU Window Maker — without the bloat.
  Event-driven companions for auto-mount (udisks2), power/session
  (logind/upower), and native notifications. Talks D-Bus to the system and
  EWMH to the window manager; the C core stays pristine.
vendor: TacitSoft
homepage: https://windowmaker.org
license: GPL-2.0-or-later

# The daemons react to these services but degrade gracefully without them, so
# they are weak deps, not hard requirements. (apk has no "recommends" concept.)
recommends:
  - udisks2
  - upower

contents:
  - src: ${WMNG_STAGE}/ng-automount
    dst: /usr/bin/ng-automount
  - src: ${WMNG_STAGE}/ng-power
    dst: /usr/bin/ng-power
  - src: ${WMNG_STAGE}/ng-notify
    dst: /usr/bin/ng-notify

# Signing is applied at the repo-assembly layer, not here (see scripts/repo.sh):
#   apt  — GPG-signed InRelease + Release.gpg
#   rpm  — GPG-signed packages (rpm --addsign) + signed repomd.xml
#   apk  — RSA-signed APKINDEX (abuild-sign)
# This keeps the recipe identical for local (unsigned) and release (signed) runs.
